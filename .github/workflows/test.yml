# GitHub Actions Test Workflow (Tier 2 — ACTIVE)
#
# Runs automated tests, linting, and boundary checks on every push and PR
# Activated: 2026-04-06 (all tests passing, ready for upstream verification)
# See: /harness/HE-DECISIONS.md (Decision 8)

name: Tests & Enforcement

on:
  push:
    branches: [master, "feat/*"]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.22.2'
      - name: Run engine tests
        run: cd src/engine && go test -v
      - name: Run enchub tests
        run: cd src/enchub && go test -v ./tests
      - name: Run engine linter
        run: cd src/engine && go vet ./...
      - name: Run enchub linter
        run: cd src/enchub && go vet ./...
      - name: Check import boundaries
        run: |
          VIOLATIONS=$(find ./src/engine ./src/enchub -name "*.go" ! -name "*_test.go" -exec grep -l "harness\|/src/harness" {} \; | wc -l)
          if [ $VIOLATIONS -gt 0 ]; then
            echo "❌ Import boundary violations found"
            exit 1
          fi

  build:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            artifact_name: enchub-linux-amd64
          - goos: linux
            goarch: arm64
            artifact_name: enchub-linux-arm64
          - goos: darwin
            goarch: amd64
            artifact_name: enchub-darwin-amd64
          - goos: darwin
            goarch: arm64
            artifact_name: enchub-darwin-arm64
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with:
          go-version: '1.22.2'
      - name: Build enchub
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          cd src/enchub
          go build -ldflags="-s -w -X main.Version=${{ github.ref_name }}" -o ../../dist/${{ matrix.artifact_name }} .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}
          retention-days: 30

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Validate project structure
        run: bash scripts/validate-structure.sh
